name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'infra/*.Dockerfile'
      - '.github/workflows/build.yml'
      - 'agent/**'
      - 'common/**'
      - 'datagen/**'
      - 'training/**'
      - 'evaluation/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: datagen
            dockerfile: infra/datagen.Dockerfile
          - name: train
            dockerfile: infra/train.Dockerfile
          - name: evaluate
            dockerfile: infra/evaluate.Dockerfile
          - name: rollout
            dockerfile: infra/rollout.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        if: matrix.name == 'train' || matrix.name == 'evaluate'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ml-systems-${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
