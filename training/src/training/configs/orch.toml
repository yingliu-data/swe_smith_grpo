# prime-rl v0.5.0 OrchestratorConfig
# Loaded into RLConfig.orchestrator via `--orchestrator @orch.toml`.
# Schema: src/prime_rl/configs/orchestrator.py  (see OrchestratorConfig).

batch_size = 16            # total rollouts per step
rollouts_per_example = 4   # GRPO group size G — unique prompts = batch_size/G = 4
seq_len = 16384
max_steps = 30
max_async_level = 1
max_off_policy_steps = 16
seed = 42

[model]
name = "SWE-bench/SWE-agent-LM-7B"

[sampling]
temperature = 1.0
max_tokens = 2048

# ---------------------------------------------------------------------------
# Training environment. prime-rl resolves `id` via `verifiers.load_environment`
# (entry-point-registered names). Our custom SWEAgentEnv in
# training/src/training/swe_env.py is NOT yet registered. Two working paths:
#
#   A) Register it: add to training/pyproject.toml
#        [project.entry-points."verifiers.environments"]
#        swe-agent-env = "training.swe_env:load_environment"
#      and expose a `load_environment(**args) -> SWEAgentEnv` in swe_env.py.
#
#   B) Use prime-rl's built-in (what examples/qwen30b_swe/rl.toml uses):
#        id = "mini-swe-agent-plus"
#        args = { max_turns = 20, cpu_cores = 2, memory_gb = 4, disk_size_gb = 4,
#                 labels = ["mini-swe-agent-plus"], total_timeout_minutes = 120,
#                 sandbox_client_max_workers = 64, max_command_timeouts = 3,
#                 sandbox_command_timeout = 30 }
# ---------------------------------------------------------------------------
[[env]]
id = "swe-agent-env"
args = { dataset = "/workspace/datasets/pilot/pilot.jsonl", docker_image = "ml-systems/rollout:latest", workspace_root = "/workspace", max_tool_calls = 20, max_wall_seconds = 120 }

[buffer]
seed = 42

[ckpt]
interval = 10
