# prime-rl v0.5.0 OrchestratorConfig
# Loaded via `--orchestrator @orch.toml`.  Schema: src/prime_rl/configs/orchestrator.py
# See train.toml for cross-file invariants.

batch_size           = 16   # total rollouts per step
rollouts_per_example = 4    # GRPO group size G → unique prompts = 16 / 4 = 4
seq_len              = 8192 # MUST equal train.model.seq_len
max_steps            = 30
max_async_level      = 1
max_off_policy_steps = 16
seed                 = 42

[model]
name = "SWE-bench/SWE-agent-LM-7B"

[sampling]
temperature = 1.0
max_tokens  = 2048

# ---------------------------------------------------------------------------
# Training environment.
#
# verifiers.load_environment resolves `id` via importlib.import_module, NOT
# entry-points: "swe-agent-env" → `import swe_agent_env` → call its
# `load_environment(**args)`. The module lives at training/src/swe_agent_env/
# and is installed editable into prime-rl's venv via training/pyproject.toml.
#
# Rollouts run locally in the training container (no per-rollout Docker);
# the legacy `docker_image` arg is accepted but ignored by load_environment.
# Fallback for debugging: id = "mini-swe-agent-plus" (prime-rl built-in).
# ---------------------------------------------------------------------------
[[env]]
id   = "swe-agent-env"
args = { dataset = "/workspace/datasets/pilot/pilot.jsonl", max_tool_calls = 20 }

[buffer]
seed = 42

[ckpt]
interval = 10
