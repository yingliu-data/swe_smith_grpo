# prime-rl v0.5.0 InferenceConfig
# Loaded via `--inference @infer.toml`.  Schema: src/prime_rl/configs/inference.py
# See train.toml for cross-file invariants.
#
# Deployment: 1 GPU co-located via CUDA_VISIBLE_DEVICES="0,0".  Trainer and
# vLLM share a single RTX PRO 6000 Blackwell (96 GB) as two separate
# processes.  vLLM's gpu_memory_utilization is a fraction of *total* HBM,
# but its KV-cache profiler subtracts memory already claimed by other
# processes on the same physical device.  At 0.45 we saw:
#   `Available KV cache memory: -6.44 GiB`
# because the trainer process had already loaded the 7B bf16 weights
# (~15 GiB) plus LoRA optimiser state plus activations from its profile
# forward by the time vLLM came up, leaving (0.45*96 − trainer_resident
# − vllm_weights − activations) ≈ negative.  0.75 gives vLLM a 72 GiB
# budget which accommodates trainer-resident ~30 GiB + vLLM weights ~15
# GiB + profile activations ~3 GiB and still leaves ~24 GiB for the KV
# cache.  Raise further (→0.85) if KV pressure shows up in orchestrator
# logs as `VLLM_PREFIX_CACHE_HIT_RATE` dropping.

gpu_memory_utilization = 0.75
seed                   = 42
# enable_lora + max_lora_rank are auto-set from train.model.lora by
# RLConfig.auto_setup_lora — don't duplicate here.

[server]
host = "0.0.0.0"
port = 8000

[model]
name           = "SWE-bench/SWE-agent-LM-7B"
dtype          = "bfloat16"
max_model_len  = 16384   # bounds generation budget only; trainer uses seq_len=8192.
enforce_eager  = false

[parallel]
tp = 1
dp = 1
