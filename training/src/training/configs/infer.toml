# prime-rl v0.5.0 InferenceConfig
# Loaded via `--inference @infer.toml`.  Schema: src/prime_rl/configs/inference.py
# See train.toml for cross-file invariants.
#
# Deployment: 1 GPU co-located via CUDA_VISIBLE_DEVICES="0,0".  Trainer and
# vLLM share a single RTX PRO 6000 Blackwell (96 GB).  The 7B bf16 model is
# ~15 GiB on disk; two copies (trainer + vLLM weights) plus KV cache and
# activations would OOM a 32 GB card regardless of fraction — the 32 GB 5090
# we tried first reached `Available KV cache memory: -6.44 GiB` at
# gpu_memory_utilization=0.45.  On 96 GB, 0.45 gives vLLM ~43 GiB (weights
# ~15 + KV cache ~28), leaving ~52 GiB for the trainer's weights + LoRA
# optimiser + activations.  Raise only if the trainer's peak allocation drops.

gpu_memory_utilization = 0.45
seed                   = 42
# enable_lora + max_lora_rank are auto-set from train.model.lora by
# RLConfig.auto_setup_lora — don't duplicate here.

[server]
host = "0.0.0.0"
port = 8000

[model]
name           = "SWE-bench/SWE-agent-LM-7B"
dtype          = "bfloat16"
max_model_len  = 16384   # bounds generation budget only; trainer uses seq_len=8192.
enforce_eager  = false

[parallel]
tp = 1
dp = 1
