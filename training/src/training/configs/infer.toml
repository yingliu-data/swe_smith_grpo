[model]
name = "SWE-bench/SWE-agent-LM-7B"
dtype = "bfloat16"
max_model_len = 16384
enforce_eager = false

[server]
port = 8000
host = "0.0.0.0"

[engine]
gpu_memory_utilization = 0.45
tensor_parallel_size = 1
enable_prefix_caching = false
seed = 42

[sampling]
temperature = 1.0
top_p = 0.95
max_tokens = 2048
