# prime-rl v0.5.0 TrainerConfig
# Loaded via `--trainer @train.toml`.  Schema: src/prime_rl/configs/trainer.py
#
# Cross-file invariants (train.toml / orch.toml / infer.toml must agree):
#   - [model].name                        — identical in all three.
#   - [model].seq_len == orch.seq_len     — hard requirement.
#     infer.max_model_len may be larger (it bounds generation only), but keep
#     it ≥ training seq_len or rollouts truncate.
#   - [model.lora] → inference enable_lora / max_lora_rank are auto-set by
#     RLConfig.auto_setup_lora; don't duplicate in infer.toml.

max_steps = 30
max_async_level = 1

[model]
name    = "SWE-bench/SWE-agent-LM-7B"
seq_len = 8192   # keep ≤ infer.max_model_len; bump to 16384 later if budget allows.

# Activation checkpointing: recompute every transformer block on the backward
# pass.  ~30% compute tax for a large activation-memory cut.  Kept on for the
# co-located trainer+vLLM topology on a single RTX PRO 6000 (96 GB) so the
# trainer's peak allocation stays below the budget left after vLLM claims
# its gpu_memory_utilization share (see infer.toml).  Pure GPU recompute —
# no host offload.
ac = { mode = "full", freq = 1 }


# LoRA (~0.3% trainable) + ac=full + seq_len=8192 fits on 96 GB alongside
# vLLM at gpu_memory_utilization=0.75.  If this OOMs, drop seq_len to 4096
# first, then LoRA rank 16 → 8.
#
# `dtype` is NOT a TrainerModelConfig field; mixed precision is controlled
# via optimization_dtype / reduce_dtype (both default fp32).

[model.lora]
rank           = 16
alpha          = 32
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[optim]
type         = "adamw"
lr           = 1e-6
weight_decay = 0.01
max_norm     = 0.05   # grad clip

[scheduler]
type = "constant"

# [loss] omitted → DefaultLossConfig (prime-rl's GRPO-style loss).

[ckpt]
interval  = 10
keep_last = 3
