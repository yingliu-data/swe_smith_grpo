# prime-rl v0.5.0 TrainerConfig
# Loaded into RLConfig.trainer via `--trainer @train.toml`.
# Schema: src/prime_rl/configs/trainer.py  (see TrainerConfig).

max_steps = 30
max_async_level = 1

[model]
name = "SWE-bench/SWE-agent-LM-7B"
seq_len = 16384
# `dtype` does not exist on TrainerModelConfig — live mixed precision is
# controlled via `optimization_dtype` / `reduce_dtype` (both default fp32).

[model.lora]
rank = 16
alpha = 32
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.01
max_norm = 0.05      # grad clip

[scheduler]
type = "constant"

# [loss] omitted → defaults to DefaultLossConfig (prime-rl's GRPO-style loss).

[ckpt]
interval = 10
keep_last = 3
