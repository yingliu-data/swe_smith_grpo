[model]
name = "SWE-bench/SWE-agent-LM-7B"
dtype = "bfloat16"

[model.peft]
enabled = true
type = "lora"
r = 16
alpha = 32
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[train]
profile = "smoke"
gradient_checkpointing = true
learning_rate = 1e-6
lr_scheduler = "constant"
grad_clip = 0.05
optimizer = "adamw"
micro_batch_size = 1
batch_size = 16
max_steps = 30
epochs = 1

[loss]
loss_type = "grpo"
clip_low = 0.20
clip_high = 0.28
kl_coef = 0.0
entropy_coef = 0.0
advantage = "leave_one_out"
length_normalize = "constant"
max_length_constant = 16384
importance_sampling_level = "token"
std_normalize = false
compact_filter = true

[ckpt]
interval = 10
keep_last = 3

[monitor.wandb]
project = "ml-systems-takehome"
mode = "offline"
