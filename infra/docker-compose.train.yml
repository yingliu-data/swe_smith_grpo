version: "3.9"

# Pod B — rtx 5090 training. Co-located vLLM + prime-rl.
#
# Requires RunPod pod launched with --privileged and host docker socket
# bind-mounted; see infra/runpod-notes.md.

services:
  train:
    build:
      context: ..
      dockerfile: infra/train.Dockerfile
    image: ml-systems/train:latest
    container_name: ml-train
    restart: "no"
    ipc: host
    privileged: true
    # prime-rl spawns per-rollout Docker containers via the host socket, so the
    # socket is bind-mounted and the container runs privileged.
    environment:
      - HF_HOME=/workspace/hf-cache
      - WANDB_MODE=offline
      - WANDB_DIR=/workspace/logs/wandb
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - PYTHONUNBUFFERED=1
      # 1-H100 co-location: prime-rl's launcher needs to see num_train_gpus +
      # num_infer_gpus = 2 devices. Listing GPU 0 twice maps both slots to the
      # same physical GPU; vLLM caps at gpu_memory_utilization=0.45, leaving
      # the rest for the LoRA trainer.
      - CUDA_VISIBLE_DEVICES=0,0
    volumes:
      - /workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "16gb"
    command:
      - "--dataset"
      - "/workspace/datasets/pilot/pilot.jsonl"
      - "--profile"
      - "smoke"
      - "--output-dir"
      - "/workspace/checkpoints"
      - "--sessions-root"
      - "/workspace/sessions"
