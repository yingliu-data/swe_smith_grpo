version: "3.9"

# Pod B — 1-GPU co-located training. prime-rl trainer + vLLM inference
# share a single 5090 via the CUDA_VISIBLE_DEVICES="0,0" alias (prime-rl's
# launcher otherwise refuses: num_train_gpus + num_infer_gpus = 2 > 1
# physical card). The 2-GPU dedicated layout is the intended production
# topology; this is the capacity-constrained stopgap.
#
# Rollouts run inside this container (sequential, asyncio.Lock-serialised)
# via agent.AsyncLocalEnvironment — no docker-in-docker, no privileged mode,
# no host socket bind mount.

services:
  train:
    build:
      context: ..
      dockerfile: infra/train.Dockerfile
    image: ml-systems/train:latest
    container_name: ml-train
    restart: "no"
    ipc: host
    environment:
      - CUDA_VISIBLE_DEVICES=0,0
      - HF_HOME=/workspace/hf-cache
      - WANDB_MODE=offline
      - WANDB_DIR=/workspace/logs/wandb
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - PYTHONUNBUFFERED=1
    volumes:
      - /workspace:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "16gb"
    command:
      - "--dataset"
      - "/workspace/datasets/pilot/pilot.jsonl"
      - "--profile"
      - "smoke"
      - "--output-dir"
      - "/workspace/checkpoints"
      - "--sessions-root"
      - "/workspace/sessions"
